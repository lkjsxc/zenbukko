services:
  zenbukko-api:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
    image: zenbukko:local
    working_dir: /app
    command: ["api", "--host", "0.0.0.0", "--port", "8788"]
    expose:
      - "8788"
    volumes:
      - ./data:/data
    environment:
      ZENBUKKO_SESSION_PATH: /data/session.json
      OUTPUT_DIR: /data/downloads
      PUPPETEER_HEADLESS: "true"
      ZENBUKKO_API_PORT: "8788"
      ZENBUKKO_OCR_BACKEND: ${ZENBUKKO_OCR_BACKEND:-auto}
      ZENBUKKO_NDLOCR_CMD: ${ZENBUKKO_NDLOCR_CMD:-ndlocr-lite}
      ZENBUKKO_NDLOCR_DEVICE: ${ZENBUKKO_NDLOCR_DEVICE:-cpu}
      ZENBUKKO_OCR_PAGE_DPI: ${ZENBUKKO_OCR_PAGE_DPI:-300}
      ZENBUKKO_NDLOCR_ENABLE_TCY: ${ZENBUKKO_NDLOCR_ENABLE_TCY:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}

  zenbukko-web:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: Dockerfile.web
    image: zenbukko-web:local
    working_dir: /app
    command: ["web", "--host", "0.0.0.0", "--port", "8787", "--api-url", "http://zenbukko-api:8788"]
    depends_on:
      - zenbukko-api
    ports:
      - "0.0.0.0:8787:8787"
    volumes:
      - ./data/web-ui:/web-data
    environment:
      ZENBUKKO_WEB_DATA_DIR: /web-data
      ZENBUKKO_API_URL: http://zenbukko-api:8788
      WEB_PORT: "8787"

  zenbukko-api-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
        CMAKE_CUDA_ARCHITECTURES: ${ZENBUKKO_CMAKE_CUDA_ARCHITECTURES:-86}
        CMAKE_BUILD_PARALLEL_LEVEL: ${ZENBUKKO_CMAKE_BUILD_PARALLEL_LEVEL:-2}
    image: zenbukko:local-gpu
    working_dir: /app
    command: ["api", "--host", "0.0.0.0", "--port", "8788"]
    expose:
      - "8788"
    volumes:
      - ./data:/data
    environment:
      ZENBUKKO_SESSION_PATH: /data/session.json
      OUTPUT_DIR: /data/downloads
      PUPPETEER_HEADLESS: "true"
      ZENBUKKO_API_PORT: "8788"
      ZENBUKKO_OCR_BACKEND: ${ZENBUKKO_OCR_BACKEND:-auto}
      ZENBUKKO_NDLOCR_CMD: ${ZENBUKKO_NDLOCR_CMD:-ndlocr-lite}
      ZENBUKKO_NDLOCR_DEVICE: ${ZENBUKKO_NDLOCR_DEVICE:-cuda}
      ZENBUKKO_OCR_PAGE_DPI: ${ZENBUKKO_OCR_PAGE_DPI:-300}
      ZENBUKKO_NDLOCR_ENABLE_TCY: ${ZENBUKKO_NDLOCR_ENABLE_TCY:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      ZENBUKKO_WHISPER_CUDA: "1"
      ZENBUKKO_WHISPER_BACKEND: auto
      ZENBUKKO_CMAKE_CUDA_ARCHITECTURES: "86"
      ZENBUKKO_CMAKE_BUILD_PARALLEL_LEVEL: "2"
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  zenbukko-web-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.web
    image: zenbukko-web:local
    working_dir: /app
    command: ["web", "--host", "0.0.0.0", "--port", "8787", "--api-url", "http://zenbukko-api-gpu:8788"]
    depends_on:
      - zenbukko-api-gpu
    ports:
      - "0.0.0.0:8787:8787"
    volumes:
      - ./data/web-ui:/web-data
    environment:
      ZENBUKKO_WEB_DATA_DIR: /web-data
      ZENBUKKO_API_URL: http://zenbukko-api-gpu:8788
      WEB_PORT: "8787"
