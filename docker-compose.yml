services:
  zenbukko:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
    image: zenbukko:local
    working_dir: /app
    volumes:
      - ./data:/data
    environment:
      ZENBUKKO_SESSION_PATH: /data/session.json
      OUTPUT_DIR: /data/downloads
      PUPPETEER_HEADLESS: "true"
      ZENBUKKO_OCR_BACKEND: ${ZENBUKKO_OCR_BACKEND:-local}
      ZENBUKKO_NDLOCR_CMD: ${ZENBUKKO_NDLOCR_CMD:-ndlocr-lite}
      ZENBUKKO_NDLOCR_DEVICE: ${ZENBUKKO_NDLOCR_DEVICE:-cpu}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}

  zenbukko-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
    image: zenbukko:local
    working_dir: /app
    command: ["web"]
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./data:/data
    environment:
      ZENBUKKO_SESSION_PATH: /data/session.json
      OUTPUT_DIR: /data/downloads
      PUPPETEER_HEADLESS: "true"
      WEB_PORT: "8787"
      ZENBUKKO_OCR_BACKEND: ${ZENBUKKO_OCR_BACKEND:-local}
      ZENBUKKO_NDLOCR_CMD: ${ZENBUKKO_NDLOCR_CMD:-ndlocr-lite}
      ZENBUKKO_NDLOCR_DEVICE: ${ZENBUKKO_NDLOCR_DEVICE:-cpu}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}

  zenbukko-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
        CMAKE_CUDA_ARCHITECTURES: ${ZENBUKKO_CMAKE_CUDA_ARCHITECTURES:-86}
        CMAKE_BUILD_PARALLEL_LEVEL: ${ZENBUKKO_CMAKE_BUILD_PARALLEL_LEVEL:-2}
    image: zenbukko:local-gpu
    working_dir: /app
    volumes:
      - ./data:/data
    environment:
      ZENBUKKO_SESSION_PATH: /data/session.json
      OUTPUT_DIR: /data/downloads
      PUPPETEER_HEADLESS: "true"
      ZENBUKKO_OCR_BACKEND: ${ZENBUKKO_OCR_BACKEND:-local}
      ZENBUKKO_NDLOCR_CMD: ${ZENBUKKO_NDLOCR_CMD:-ndlocr-lite}
      ZENBUKKO_NDLOCR_DEVICE: ${ZENBUKKO_NDLOCR_DEVICE:-cpu}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}

      # NVIDIA Container Toolkit settings
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video

      # whisper.cpp CUDA build/runtime hints
      ZENBUKKO_WHISPER_CUDA: "1"
      ZENBUKKO_WHISPER_BACKEND: auto
      # RTX 3070 = compute capability 8.6
      ZENBUKKO_CMAKE_CUDA_ARCHITECTURES: "86"
      ZENBUKKO_CMAKE_BUILD_PARALLEL_LEVEL: "2"

    # More widely supported GPU request syntax
    gpus: all

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  zenbukko-web-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-large-v3-turbo}
        CMAKE_CUDA_ARCHITECTURES: ${ZENBUKKO_CMAKE_CUDA_ARCHITECTURES:-86}
        CMAKE_BUILD_PARALLEL_LEVEL: ${ZENBUKKO_CMAKE_BUILD_PARALLEL_LEVEL:-2}
    image: zenbukko:local-gpu-web
    working_dir: /app
    command: ["web"]
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ./data:/data
    environment:
      ZENBUKKO_SESSION_PATH: /data/session.json
      OUTPUT_DIR: /data/downloads
      PUPPETEER_HEADLESS: "true"
      WEB_PORT: "8787"
      ZENBUKKO_OCR_BACKEND: ${ZENBUKKO_OCR_BACKEND:-local}
      ZENBUKKO_NDLOCR_CMD: ${ZENBUKKO_NDLOCR_CMD:-ndlocr-lite}
      ZENBUKKO_NDLOCR_DEVICE: ${ZENBUKKO_NDLOCR_DEVICE:-cpu}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      ZENBUKKO_WHISPER_CUDA: "1"
      ZENBUKKO_WHISPER_BACKEND: auto
      ZENBUKKO_CMAKE_CUDA_ARCHITECTURES: "86"
      ZENBUKKO_CMAKE_BUILD_PARALLEL_LEVEL: "2"
    gpus: all
