<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Assistant</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Study Assistant</h1>
    <p class="tagline">A local learning aid for organizing study pages, materials, transcripts, and notes from services you can access.</p>
  </header>
  <main>
    <div class="grid">
      <section>
        <h2>Session</h2>
        <div id="status" class="muted">Loading status...</div>
        <label>Paste session.json</label>
        <textarea id="sessionInput" spellcheck="false"></textarea>
        <div class="row top"><button id="saveSession">Save Session</button><button class="secondary" id="loadCourses">Load Courses</button></div>
      </section>
      <section>
        <h2>Study Job</h2>
        <label>Learning page URL</label><input id="learningUrl" placeholder="https://.../courses/12345" />
        <label>Chapter range</label><input id="chapterRange" placeholder="1,3-5 (course order)" />
        <label>Chapter IDs</label><input id="chapters" placeholder="comma-separated, advanced" />
        <label>Lesson IDs</label><input id="lessonIds" placeholder="comma-separated, optional" />
        <label>Concurrency</label><input id="maxConcurrency" value="6" />
        <div>
          <label class="check"><input type="checkbox" id="transcribe" /> Transcribe</label>
          <label class="check"><input type="checkbox" id="materials" /> Materials</label>
          <label class="check"><input type="checkbox" id="ocrMaterials" /> PDF OCR</label>
          <label class="check"><input type="checkbox" id="cleanup" checked /> Delete media after transcript</label>
        </div>
        <div class="row top"><button id="startDownload">Start Study Job</button></div>
      </section>
    </div>
    <section><h2>Courses</h2><table><thead><tr><th>ID</th><th>Title</th><th>Source</th></tr></thead><tbody id="courses"></tbody></table></section>
    <section>
      <h2>OCR Settings</h2>
      <label>Backend</label><select id="ocrBackend"><option value="auto">auto</option><option value="local">local</option><option value="gemini">gemini</option></select>
      <label>API key</label><input id="geminiApiKey" type="password" autocomplete="off" />
      <label>Gemini model</label><input id="geminiModel" value="gemini-3.1-flash-lite" />
      <label>OCR mode</label><select id="ocrMode"><option>auto</option><option>batch</option><option>flex</option></select>
      <label>OCR service tier</label><select id="ocrServiceTier"><option>flex</option><option>standard</option></select>
      <label>NDLOCR-Lite command</label><input id="ndlocrCommand" value="ndlocr-lite" />
      <label>NDLOCR-Lite device</label><select id="ndlocrDevice"><option>cpu</option><option>cuda</option></select>
      <label>Local OCR page DPI</label><input id="ocrPageDpi" value="300" />
      <label class="check"><input type="checkbox" id="ocrKeepIntermediates" /> Keep local OCR intermediates</label>
      <label class="check"><input type="checkbox" id="ndlocrEnableTcy" checked /> Enable tate-chu-yoko handling</label>
      <div class="row top"><button id="saveSettings">Save Settings</button></div>
    </section>
    <section><h2>Standalone OCR</h2><label>Input directory</label><input id="ocrInput" value="/data/downloads" /><div class="row top"><button id="startOcr">Start OCR</button></div></section>
    <section><h2>Jobs</h2><table><thead><tr><th>ID</th><th>Job</th><th>Status</th><th>Updated</th></tr></thead><tbody id="jobs"></tbody></table></section>
    <section><h2>Log</h2><pre id="log"></pre></section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
